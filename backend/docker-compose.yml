version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ev_charging
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://user:password@db/ev_charging
      REDIS_HOST: redis
      SECRET_KEY: your-super-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  postgres_data: